name: privmsg
description: Privacy Messenger — E2EE, anonymous, serverless

publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.2
  path_provider: ^2.1.2
  path: ^1.9.0

  # Crypto (Dart native — no external C libs needed for MVP)
  pointycastle: ^3.7.4
  convert: ^3.1.1
  
  # Networking
  web_socket_channel: ^2.4.3
  
  # UI
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  uuid: ^4.3.3
  
  # Utils
  provider: ^6.1.2
  rxdart: ^0.27.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
