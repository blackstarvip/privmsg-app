name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # qo'lda ishga tushirish uchun

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Kodni olish ──────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java o'rnatish ───────────────────────────────────────────────────
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── 3. Flutter o'rnatish ────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      # ── 4. Dependenciyalar ──────────────────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # ── 5. Linting ──────────────────────────────────────────────────────────
      - name: Analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # ── 6. Testlar ──────────────────────────────────────────────────────────
      - name: Run tests
        run: flutter test
        continue-on-error: true

      # ── 7. APK build (release) ──────────────────────────────────────────────
      - name: Build APK
        run: flutter build apk --release --split-per-abi

      # ── 8. APK artifact sifatida saqlash ────────────────────────────────────
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: privmsg-apk
          path: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 30

      # ── 9. Release yaratish (faqat main/master da) ──────────────────────────
      - name: Create Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: PrivMsg v${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          body: |
            ## PrivMsg APK — Avtomatik build

            ### O'rnatish
            - **arm64-v8a** — zamonaviy Android telefonlar (2017+) ✅ tavsiya etiladi
            - **armeabi-v7a** — eski telefonlar

            ### Xususiyatlar
            - End-to-end encryption (X3DH + Double Ratchet)
            - Anonim identifikator (faqat public key)
            - Tor routing (ixtiyoriy)
            - Markaziy server yo'q
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
